<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Vibe</title>
    <style>
        body {
            background-color: #121212;
            color: #ffc107;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .highlight {
            color: cyan;
        }
        input[type="text"] {
            width: 300px;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ffc107;
            background-color: #1e1e1e;
            color: white;
        }
        button {
            padding: 10px 20px;
            background-color: #ffc107;
            border: none;
            color: black;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: cyan;
        }
    </style>
</head>
<body>
    <h1>Welcome to the <span class="highlight">Vibe Checker</span></h1>
    <p>Enter a URL to Check its Vibe:</p>
    <input type="text" placeholder="Enter URL here" />
    <button>CHECK VIBE</button>
</body>
</html>
